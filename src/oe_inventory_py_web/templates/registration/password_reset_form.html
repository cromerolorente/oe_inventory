{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OE Inventory - Reset password</title>
    <link rel="icon" type="image/png" href="/static/octopus.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>
<body class="bg-light">
    <div class="container" style="max-width: 430px; margin-top: 8vh;">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <div class="text-center mb-3">
                    <img src="/static/octopus.png" alt="OE" style="height: 48px;">
                    <h5 class="fw-bold mt-2" style="color:#FF48D8;">Reset your password</h5>
                </div>
                <p class="text-muted small">Enter your account email and we'll send you a link to set a new password.</p>
                <form method="post">
                    {% csrf_token %}
                    {% if form.email.errors %}
                        <div class="alert alert-danger py-1 px-2 small">{{ form.email.errors|striptags }}</div>
                    {% endif %}
                    <div class="mb-3">
                        <label for="id_email" class="form-label small fw-bold">Email</label>
                        <input type="email" name="email" id="id_email" class="form-control form-control-sm"
                            maxlength="254" required autofocus>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-sm text-white" style="background-color:#FF48D8;">Send reset link</button>
                        <a href="{% url 'login' %}" class="btn btn-link btn-sm">Back to login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
