{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OE Inventory - Password changed</title>
    <link rel="icon" type="image/png" href="/static/octopus.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
</head>
<body class="bg-light">
    <div class="container" style="max-width: 430px; margin-top: 8vh;">
        <div class="card shadow-sm">
            <div class="card-body p-4 text-center">
                <img src="/static/octopus.png" alt="OE" style="height: 48px;">
                <h5 class="fw-bold mt-2" style="color:#FF48D8;">Password changed</h5>
                <p class="text-muted small mt-3">Your password has been set. You can now log in with your new password.</p>
                <a href="{% url 'login' %}" class="btn btn-sm text-white" style="background-color:#FF48D8;">Go to login</a>
            </div>
        </div>
    </div>
</body>
</html>
