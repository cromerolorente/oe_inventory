{% load static %}
<!-- partials/finder_modal.html -->
<div class="modal fade" id="finderModal" tabindex="-1" aria-labelledby="finderModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content app-surface">

      <div class="modal-header py-2">
        <h6 class="modal-title fw-bold" id="finderModalLabel" style="color: #FF48D8;">
          <i class="bi bi-search"></i> Finder
        </h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
          style="font-size: 0.6rem;"></button>
      </div>

      <div class="modal-body p-3">
        <div class="input-group mb-3">
          <span class="input-group-text bg-light fw-bold" style="font-size: 0.75rem;">Find:</span>
          <input type="text" id="finderSearchInput" class="form-control form-control-sm"
            placeholder="Type to search...">
          <button class="btn p-0 border-0 ms-2" type="button" id="btnFinderSearch">
            <img src="/static/buttons/find.png" alt="Find" style="width: 24px; height: 24px; display: block;">
          </button>
        </div>

        <div class="table-responsive" style="max-height: 300px; overflow-y: auto;">
          <table class="table table-sm table-hover table-striped table-borderless border-bottom mb-0" id="finderTable"
            style="font-size: 0.75rem;">
            <thead class="table-dark sticky-top">
              <tr>
                <th>Code</th>
                <th>Description</th>
              </tr>
            </thead>
            <tbody id="finderResultsBody">
              <tr>
                <td colspan="2" class="text-center text-muted py-3">Press SEARCH button to load data.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="{% static 'js/finder.js' %}"></script>
