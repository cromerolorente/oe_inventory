{% extends 'oe_inventory_py_web/base_mdi.html' %}

{% block content %}
<div class="container py-3 app-surface">

    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
        <h5 class="mb-0 fw-bold" style="color: #FF48D8;">
            <img src="/static/octopus.png" alt="" style="height: 1.2em; vertical-align: -0.2em;">
            {% if lang == 'en' %}User Manual{% else %}Manual de Usuario{% endif %}
        </h5>
        <div class="d-flex align-items-center gap-2">
            <span class="text-muted small d-none d-md-inline"><i class="bi bi-translate"></i></span>
            <div class="btn-group btn-group-sm" role="group" aria-label="Language">
                <a href="?lang=es" class="btn {% if lang == 'es' %}btn-primary{% else %}btn-outline-primary{% endif %}">Español</a>
                <a href="?lang=en" class="btn {% if lang == 'en' %}btn-primary{% else %}btn-outline-primary{% endif %}">English</a>
            </div>
            <a href="{% url 'mdi_home' %}" class="btn btn-danger btn-sm px-3"><i class="bi bi-box-arrow-right"></i> Exit</a>
        </div>
    </div>

    <article class="card shadow-sm p-4 bg-white manual-body">
        {{ manual_html|safe }}
    </article>
</div>

<style>
    /* Keep the manual comfortable to read and the screenshots tidy. */
    .manual-body { max-width: 900px; margin: 0 auto; line-height: 1.6; }
    .manual-body img { max-width: 100%; height: auto; border: 1px solid #dee2e6; border-radius: .375rem; margin: .5rem 0; }
    .manual-body h1 { color: #FF48D8; font-size: 1.6rem; }
    .manual-body h2 { margin-top: 2rem; padding-bottom: .3rem; border-bottom: 1px solid #eee; }
    .manual-body h3 { margin-top: 1.5rem; color: #333; }
    .manual-body table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    .manual-body th, .manual-body td { border: 1px solid #dee2e6; padding: .4rem .6rem; font-size: .9rem; }
    .manual-body th { background: #f8f9fa; }
    .manual-body blockquote { border-left: 4px solid #FF48D8; background: #fff5fc; padding: .5rem 1rem; margin: 1rem 0; color: #555; }
    .manual-body code { background: #f1f3f5; padding: .1rem .3rem; border-radius: .25rem; }
    .manual-body hr { margin: 2rem 0; }
</style>
{% endblock %}
